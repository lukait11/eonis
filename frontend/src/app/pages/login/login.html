<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      @if (error()) {
        <div class="form-error-banner">{{ error() }}</div>
      }

      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="field-error">Enter a valid email.</span>
        }
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="field-error">Password is required.</span>
        }
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
