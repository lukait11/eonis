<div class="explore-page">
  <aside class="filters">
    <div class="filters-header">
      <h2>Filters</h2>
      <button class="clear-btn" (click)="clearFilters()">Clear all</button>
    </div>

    <div class="filter-group">
      <label class="filter-label">Search</label>
      <input
        class="filter-input"
        type="text"
        placeholder="Search products..."
        [value]="search()"
        (input)="onSearch($any($event.target).value)"
      />
    </div>

    <div class="filter-group">
      <label class="filter-label">Category</label>
      <select class="filter-select" [value]="selectedCategory()" (change)="onCategory($any($event.target).value)">
        <option value="">All categories</option>
        @for (cat of categories(); track cat.id) {
          <option [value]="cat.id">{{ cat.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Sort by</label>
      <select class="filter-select" [value]="sort()" (change)="onSort($any($event.target).value)">
        <option value="default">Default</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="newest">Newest</option>
      </select>
    </div>
  </aside>

  <main class="results">
    <div class="results-bar">
      <p class="results-count">
        @if (loading()) { Loading... }
        @else { {{ filtered().length }} product{{ filtered().length !== 1 ? 's' : '' }} }
      </p>
    </div>

    @if (loading()) {
      <div class="products-grid">
        @for (n of [1,2,3,4,5,6,8]; track n) {
          <div class="skeleton-card"></div>
        }
      </div>
    } @else if (filtered().length === 0) {
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>No products found</p>
        <button class="clear-btn-lg" (click)="clearFilters()">Clear filters</button>
      </div>
    } @else {
      <div class="products-grid">
        @for (p of filtered(); track p.id) {
          <app-product-card [product]="p" />
        }
      </div>
    }
  </main>
</div>
