<header class="header">
  <div class="header-inner">
    <a routerLink="/" class="logo">EONIS</a>

    <nav class="nav" [class.open]="menuOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="menuOpen.set(false)">Home</a>
      <a routerLink="/explore" routerLinkActive="active" (click)="menuOpen.set(false)">Explore</a>
      @if (auth.isLoggedIn() && auth.currentUserRole() === 'Seller') {
        <a routerLink="/my-store" routerLinkActive="active" (click)="menuOpen.set(false)">My Store</a>
      }
    </nav>

    <div class="header-actions">
      @if (auth.isLoggedIn()) {
        <a routerLink="/wishlist" class="icon-btn" aria-label="Wishlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          @if (wishlist.itemCount() > 0) {
            <span class="badge">{{ wishlist.itemCount() }}</span>
          }
        </a>
        <a routerLink="/cart" class="icon-btn" aria-label="Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          @if (cart.itemCount() > 0) {
            <span class="badge">{{ cart.itemCount() }}</span>
          }
        </a>
        <a routerLink="/profile" class="icon-btn" aria-label="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
        <button class="btn-ghost" (click)="onLogout()">Sign out</button>
      } @else {
        <a routerLink="/login" class="btn-ghost">Sign in</a>
        <a routerLink="/register" class="btn-accent">Join</a>
      }

      <button class="hamburger" (click)="toggleMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
