<a [routerLink]="['/product', product.id]" class="card">
  <div class="card-image">
    @if (image) {
      <img [src]="image" [alt]="product.name" loading="lazy" />
    } @else {
      <div class="placeholder-img">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
    }
    @if (auth.isLoggedIn()) {
      <button class="wishlist-btn" [class.active]="isWishlisted" (click)="toggleWishlist($event)" aria-label="Wishlist">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    }
    @if (hasDiscount) {
      <span class="badge-discount">-{{ product.discount }}%</span>
    }
  </div>

  <div class="card-body">
    <p class="card-category">{{ product.category?.name ?? 'Uncategorized' }}</p>
    <h3 class="card-name">{{ product.name }}</h3>
    <div class="card-price">
      <span class="price-current">{{ price | number:'1.2-2' }} RSD</span>
      @if (hasDiscount) {
        <span class="price-original">{{ product.basePrice | number:'1.2-2' }}</span>
      }
    </div>
  </div>
</a>
